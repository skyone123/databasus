version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "REFACTOR (deps)"

  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      backend-minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "REFACTOR (deps)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "REFACTOR (deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "REFACTOR (deps)"
