# Physical-backup mTLS test cluster: client-cert + password over TLS, plaintext
# rejected. Unlike the logical mTLS hba, this one carries an explicit
# `replication` line — `all` in the database column does NOT cover replication
# connections, so pg_receivewal / pg_basebackup would be rejected without it.
local      all          all                                trust
hostssl    all          all   0.0.0.0/0   scram-sha-256   clientcert=verify-ca
hostssl    all          all   ::/0        scram-sha-256   clientcert=verify-ca
hostssl    replication  all   0.0.0.0/0   scram-sha-256   clientcert=verify-ca
hostssl    replication  all   ::/0        scram-sha-256   clientcert=verify-ca
hostnossl  all          all   0.0.0.0/0   reject
hostnossl  all          all   ::/0        reject
