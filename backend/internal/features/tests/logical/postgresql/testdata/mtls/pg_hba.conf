# mTLS-enforcing pg_hba.conf used only by the test-logical-postgres-mtls container.
# Local Unix-socket connections are trusted (so the entrypoint can run initdb),
# but every TCP connection MUST present a client certificate signed by ca.crt
# over TLS - plaintext TCP and uncertified TLS are both rejected.
# This reproduces a Cloud SQL instance with "Require trusted client certificates".
local      all   all                                       trust
hostssl    all   all   0.0.0.0/0   scram-sha-256   clientcert=verify-ca
hostssl    all   all   ::/0        scram-sha-256   clientcert=verify-ca
hostnossl  all   all   0.0.0.0/0   reject
hostnossl  all   all   ::/0        reject
