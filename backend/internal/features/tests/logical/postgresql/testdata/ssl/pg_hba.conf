# SSL-enforcing pg_hba.conf used only by the test-logical-postgres-ssl container.
# Local Unix-socket connections are trusted (so the entrypoint can run initdb),
# but every TCP connection MUST come over TLS — non-SSL TCP is rejected outright.
# This guarantees a regression that silently drops SSL on the client side fails
# the SSL backup/restore test instead of falling back to plaintext.
local      all   all                  trust
hostssl    all   all   0.0.0.0/0      scram-sha-256
hostssl    all   all   ::/0           scram-sha-256
hostnossl  all   all   0.0.0.0/0      reject
hostnossl  all   all   ::/0           reject
