services:
  # ================================================================
  # Local image build (opt-in via profile)
  # ================================================================

  # For local development only to test build. This service is gated
  # behind the "image" profile so it does NOT start with a plain
  # `docker compose up -d`. To run: docker compose up databasus-local
  databasus-local:
    profiles: ["image"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    volumes:
      - ./databasus-data:/databasus-data
    container_name: databasus-local
    restart: unless-stopped

  # ================================================================
  # Backend dev services
  # ================================================================

  # For development only, because this DB
  # exposes its port to the public
  backend-db:
    image: postgres:17
    ports:
      - "${BACKEND_DB_PORT:-5437}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    container_name: backend-db
    shm_size: 10gb

  # Dedicated test DB so `make test` doesn't pollute the dev DB
  backend-db-test:
    image: postgres:17
    ports:
      - "${BACKEND_DB_TEST_PORT:-5438}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - ./pgdata-test:/var/lib/postgresql/data
    container_name: backend-db-test
    shm_size: 10gb

  # Valkey for caching
  backend-valkey:
    image: valkey/valkey:9.0.1-alpine
    ports:
      - "${VALKEY_PORT}:6379"
    volumes:
      - ./valkey-data:/data
    container_name: backend-valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # VictoriaLogs for external logging
  backend-victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: backend-victoria-logs
    ports:
      - "${BACKEND_VICTORIA_LOGS_PORT:-9428}:9428"
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
      - -httpAuth.password=devpassword
    volumes:
      - ./victoria-logs-data:/victoria-logs-data
    restart: unless-stopped

  # ================================================================
  # Agent dev services
  # ================================================================

  agent-db:
    image: postgres:17
    container_name: agent-db
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "${AGENT_DB_PORT:-7433}:5432"
    command:
      - bash
      - -c
      - |
        mkdir -p /wal-queue && chown postgres:postgres /wal-queue
        exec docker-entrypoint.sh postgres \
          -c wal_level=replica \
          -c max_wal_senders=3 \
          -c archive_mode=on \
          -c "archive_command=cp %p /wal-queue/%f"
    volumes:
      - ./wal-queue:/wal-queue
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 2s
      timeout: 5s
      retries: 30

  # ================================================================
  # Test containers
  # ================================================================

  # Test MinIO container
  test-minio:
    image: minio/minio:latest
    ports:
      - "${TEST_MINIO_PORT}:9000"
      - "${TEST_MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=testuser
      - MINIO_ROOT_PASSWORD=testpassword
    container_name: test-minio
    command: server /data --console-address ":9001"

