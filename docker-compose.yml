  # ================================================================
  # SSL / TLS test containers
  # One representative version per engine — the goal is to catch SSL
  # handshake regressions without multiplying the version matrix.
  # ================================================================

  # Certs are baked in via build context (COPY) instead of bind-mounted.
  # CI runs Docker-in-Docker where host paths don't resolve to the job
  # container's workspace, but build contexts are uploaded to the daemon
  # as a tarball so they always reach the container.
  test-postgres-ssl:
    build:
      context: ./backend/internal/features/tests/testdata/ssl
      dockerfile_inline: |
        FROM postgres:18
        COPY server.key /etc/ssl-test/server.key
        COPY server.crt /etc/ssl-test/server.crt
        COPY pg_hba.conf /etc/ssl-test/pg_hba.conf
        RUN chown postgres:postgres /etc/ssl-test/server.key /etc/ssl-test/server.crt /etc/ssl-test/pg_hba.conf \
         && chmod 600 /etc/ssl-test/server.key \
         && chmod 644 /etc/ssl-test/server.crt /etc/ssl-test/pg_hba.conf
    ports:
      - "${TEST_POSTGRES_SSL_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command: postgres -c ssl=on -c ssl_cert_file=/etc/ssl-test/server.crt -c ssl_key_file=/etc/ssl-test/server.key -c hba_file=/etc/ssl-test/pg_hba.conf
    container_name: test-postgres-ssl
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-mariadb-ssl:
    image: mariadb:11.8
    ports:
