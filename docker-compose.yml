  # Certs baked in via build context — see test-postgres-ssl note.
  test-mongodb-ssl:
    build:
      context: ./backend/internal/features/tests/testdata/ssl
      dockerfile_inline: |
        FROM mongo:8.2.3-noble
        COPY server.pem /etc/ssl-test/server.pem
        COPY server.crt /etc/ssl-test/server.crt
        RUN chown mongodb:mongodb /etc/ssl-test/server.pem /etc/ssl-test/server.crt \
         && chmod 600 /etc/ssl-test/server.pem \
         && chmod 644 /etc/ssl-test/server.crt
    container_name: test-mongodb-ssl
    ports:
      - "${TEST_MONGODB_SSL_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: testdb
    command: mongod --auth --tlsMode requireTLS --tlsCertificateKeyFile /etc/ssl-test/server.pem --tlsCAFile /etc/ssl-test/server.crt --tlsAllowConnectionsWithoutCertificates
    healthcheck:
      test: ["CMD", "mongosh", "--tls", "--tlsAllowInvalidCertificates",
             "-u", "root", "-p", "rootpassword", "--authenticationDatabase", "admin",
             "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
